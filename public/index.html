<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp Bot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <main class="mx-auto max-w-7xl px-4 py-6">
    <header class="flex flex-col gap-4 border-b border-zinc-800 pb-5 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 id="botName" class="text-2xl font-semibold">WhatsApp Bot</h1>
        <p id="pairingStatus" class="mt-1 text-sm text-zinc-400">Starting</p>
      </div>
      <div class="flex gap-2">
        <button id="stopBtn" class="rounded-md bg-rose-700 px-4 py-2 text-sm font-medium hover:bg-rose-600 disabled:cursor-not-allowed disabled:opacity-40">Stop</button>
        <button id="restartBtn" class="rounded-md bg-cyan-700 px-4 py-2 text-sm font-medium hover:bg-cyan-600 disabled:cursor-wait disabled:opacity-40">Restart</button>
      </div>
    </header>

    <section class="mt-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Bot Status</p><strong id="connected" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Uptime</p><strong id="uptime" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Memory Usage</p><strong id="memoryUsage" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">CPU Usage</p><strong id="cpuUsage" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Total Group</p><strong id="totalGroup" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Total User</p><strong id="totalUser" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Total Chat</p><strong id="totalChat" class="mt-2 block text-xl">-</strong></div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4"><p class="text-sm text-zinc-400">Pairing Code</p><strong id="pairingCode" class="mt-2 block text-xl">-</strong></div>
    </section>

    <section class="mt-6 grid gap-4 lg:grid-cols-[360px_1fr]">
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4">
        <h2 class="font-semibold">QR / Pairing</h2>
        <img id="qrImage" class="mt-4 hidden h-80 w-80 rounded bg-white object-contain" alt="WhatsApp login QR">
        <p id="qrEmpty" class="mt-4 text-sm text-zinc-400">QR akan tampil saat dibutuhkan.</p>
      </div>
      <div class="rounded-md border border-zinc-800 bg-zinc-900 p-4">
        <h2 class="font-semibold">Log Activity</h2>
        <div id="logs" class="mt-4 h-[420px] overflow-auto rounded bg-zinc-950 p-3 font-mono text-xs text-zinc-300"></div>
      </div>
    </section>
  </main>

  <script>
    const ids = ['botName','pairingStatus','connected','uptime','memoryUsage','cpuUsage','totalGroup','totalUser','totalChat','pairingCode'];
    const setText = (id, value) => { document.getElementById(id).textContent = value || '-'; };
    const load = async () => {
      const data = await fetch('/api/status').then((res) => res.json());
      setText('botName', data.botName);
      setText('pairingStatus', data.pairingStatus);
      setText('connected', data.running ? (data.connected ? 'Connected' : 'Disconnected') : 'Stopped');
      document.getElementById('stopBtn').disabled = !data.running;
      for (const id of ids.slice(3)) setText(id, data[id]);
      const qrImage = document.getElementById('qrImage');
      const empty = document.getElementById('qrEmpty');
      if (data.qrImage) {
        empty.classList.add('hidden');
        qrImage.classList.remove('hidden');
        qrImage.src = data.qrImage;
      } else {
        qrImage.classList.add('hidden');
        qrImage.removeAttribute('src');
        empty.classList.remove('hidden');
      }
      const logs = document.getElementById('logs');
      const rows = data.logs.map((log) => {
        const row = document.createElement('div');
        row.className = 'border-b border-zinc-900 py-1';
        const time = document.createElement('span');
        time.className = 'text-zinc-500';
        time.textContent = log.time;
        const level = document.createElement('span');
        level.className = 'text-cyan-300';
        level.textContent = log.level;
        row.append(time, ' ', level, ` ${log.message}`);
        return row;
      });
      logs.replaceChildren(...rows);
    };

    const control = async (action) => {
      const buttons = [document.getElementById('stopBtn'), document.getElementById('restartBtn')];
      buttons.forEach((button) => { button.disabled = true; });
      try {
        const response = await fetch(`/api/${action}`, { method: 'POST' });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `Gagal menjalankan ${action}.`);
        await load();
      } catch (error) {
        window.alert(error.message);
      } finally {
        buttons.forEach((button) => { button.disabled = false; });
        await load();
      }
    };

    document.getElementById('stopBtn').onclick = () => {
      if (window.confirm('Hentikan koneksi bot WhatsApp? Dashboard akan tetap aktif.')) control('stop');
    };
    document.getElementById('restartBtn').onclick = () => control('restart');
    new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`).onmessage = load;
    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
